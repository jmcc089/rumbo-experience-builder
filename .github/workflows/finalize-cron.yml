name: Finalize provider windows

# Drives Phase 2: any client request whose ~10-minute provider-acceptance window
# has closed gets its proposals built and its "ready" email sent.
#
# Why this loops instead of firing a single curl: GitHub does not honour the
# `schedule` cadence. In practice these runs land roughly an hour apart rather
# than every 5 minutes, which delayed the "your itineraries are ready" email by
# up to that much. We cannot make GitHub punctual, so instead each run stays
# alive and polls every 60s, covering the gap until the next run starts. The
# endpoint is idempotent, so overlapping ticks are harmless.
#
# Actions minutes are free and unmetered on public repositories, so the long
# job costs nothing.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   APP_URL      e.g. https://rumbo-experience-builder.vercel.app  (no trailing slash)
#   CRON_SECRET  same value set as an env var in Vercel
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Keep a single poller alive at a time. A run that fires while another is still
# looping queues instead of doubling up.
concurrency:
  group: finalize-poller
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Poll the finalize endpoint for ~55 minutes
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          deadline=$(( SECONDS + 55 * 60 ))
          ticks=0
          while [ "$SECONDS" -lt "$deadline" ]; do
            # A single failed tick must not kill the poller: the next one is 60s away.
            curl --fail --silent --show-error --max-time 30 -X POST \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              "${APP_URL}/api/cron/finalize" \
              || echo "tick failed, continuing"
            ticks=$(( ticks + 1 ))
            sleep 60
          done
          echo "completed $ticks ticks"
